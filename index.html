<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="./OIP.webp" alt="GitHub Logo">
            <h1>GITHUB <span>PROFILE FINDER</span></h1>
        </div>
        <hr>
        <div class="hero">

            <button id="searchBtn" onclick="searchUser()">Search</button>
            <p id="profile"></p>
        </div>




    </div>


    <script src="script.js"></script>
